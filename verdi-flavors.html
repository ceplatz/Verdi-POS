<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdi · Sabores del Día</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #006E51;   /* Pantone 335C */
  --green-d:    #005540;
  --green-l:    #00896A;
  --green-pale: rgba(0,110,81,0.07);
  --green-pale2:rgba(0,110,81,0.13);
  --border:     rgba(0,110,81,0.22);
  --border-h:   rgba(0,110,81,0.55);
  --gold:       #C9A84C;
  --gold-l:     #F0CC6A;
  --text:       #006E51;
  --text-d:     rgba(0,80,60,0.65);
  --text-dd:    rgba(0,80,60,0.40);
  --r:          10px;
  --r-lg:       16px;
  --ff-display: 'Playfair Display', Georgia, serif;
  --ff-body:    'DM Sans', sans-serif;
}

html, body {
  min-height: 100vh;
  background: #fff;
  color: var(--text);
  font-family: var(--ff-body);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
}

body::before { display:none; }

.page { position:relative; z-index:1; max-width:980px; margin:0 auto; padding:0 16px 60px; }

/* Loading */
.loading { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.spinner { width:36px; height:36px; border:2px solid rgba(0,110,81,0.2); border-top-color:var(--green); border-radius:50%; animation:spin 0.85s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Green header banner (keeps logo visible on white page) */
.c-header-banner {
  background: var(--green);
  margin: 0 -16px;
  padding: 28px 16px 24px;
  text-align: center;
}
.verdi-logo { display:flex; justify-content:center; }
.verdi-logo img { width:200px; height:auto; display:block; }

/* ── White content header below banner */
.c-header-info {
  text-align: center;
  padding: 24px 0 0;
}
.c-header-info::after {
  content:''; display:block; width:48px; height:2px;
  background: var(--green);
  margin: 20px auto 0;
  border-radius: 2px;
  opacity: 0.35;
}
.eyebrow { font-size:10px; font-weight:500; letter-spacing:0.32em; text-transform:uppercase; color:var(--text-d); margin-bottom:8px; }
.c-tagline { font-family:var(--ff-display); font-size:clamp(26px,5vw,42px); font-weight:400; line-height:1.15; color:var(--green); }
.c-tagline em { font-style:italic; color:var(--green-l); }
.c-date { margin-top:10px; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dd); }
.c-updated { display:inline-flex; align-items:center; gap:6px; margin-top:6px; font-size:11px; color:var(--text-dd); }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:breathe 2.4s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.75)} }

/* ── Flavor grid — 2 cols on mobile */
.flavor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-top: 24px;
}

.flavor-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px 14px;
  transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
  animation: cardIn 0.5s cubic-bezier(0.23,1,0.32,1) both;
  position: relative; overflow: hidden; cursor: default;
}
.flavor-card:hover { transform:translateY(-2px); border-color:var(--border-h); box-shadow:0 8px 28px rgba(0,110,81,0.12); }
.flavor-card.is-favorite { border-color:var(--gold); border-width:2px; box-shadow:0 2px 16px rgba(201,168,76,0.15); }
.flavor-card.is-favorite::after {
  content:'⭐';
  position:absolute; top:10px; right:10px;
  font-size:14px; line-height:1;
}

@keyframes cardIn { from{opacity:0;transform:translateY(10px) scale(0.98)} to{opacity:1;transform:none} }
.flavor-card:nth-child(1){animation-delay:.03s} .flavor-card:nth-child(2){animation-delay:.06s}
.flavor-card:nth-child(3){animation-delay:.09s} .flavor-card:nth-child(4){animation-delay:.12s}
.flavor-card:nth-child(5){animation-delay:.15s} .flavor-card:nth-child(6){animation-delay:.18s}
.flavor-card:nth-child(7){animation-delay:.21s} .flavor-card:nth-child(8){animation-delay:.24s}
.flavor-card:nth-child(n+9){animation-delay:.27s}

.flavor-dot { width:24px; height:24px; border-radius:50%; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.flavor-name { font-family:var(--ff-display); font-size:17px; font-weight:400; line-height:1.2; margin-bottom:5px; color:var(--green); }
.flavor-desc { font-size:11px; line-height:1.55; color:var(--text-d); font-weight:300; margin-bottom:12px; }
.allergen-row { display:flex; flex-wrap:wrap; gap:3px; }

/* Allergen badges */
.badge { font-size:8.5px; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; padding:2px 7px; border-radius:20px; border:1px solid var(--border); background:var(--green-pale); color:var(--green); }
.b-sugarfree { background:rgba(255,215,0,0.12); border-color:rgba(201,168,76,0.6); color:#9A7200; font-weight:700; }
.b-vegan     { background:rgba(0,110,81,0.10); border-color:rgba(0,110,81,0.45); color:var(--green-d); font-weight:700; }
.b-sorbet    { background:rgba(0,150,200,0.10); border-color:rgba(0,150,200,0.40); color:#006A8E; font-weight:700; }
.b-favorite  { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.7); color:#9A7200; font-weight:700; display:none; }

.no-allerg { font-size:10.5px; color:var(--text-dd); display:flex; align-items:center; gap:4px; }
.no-allerg::before { content:'✓'; font-size:11px; color:var(--green); }

/* Empty state */
.empty { grid-column:1/-1; text-align:center; padding:60px 0; }
.empty .ice { font-size:44px; margin-bottom:16px; }
.empty h2 { font-family:var(--ff-display); font-size:26px; font-weight:400; color:var(--text-d); margin-bottom:8px; }
.empty p { font-size:13px; color:var(--text-dd); }

/* Footer */
.c-footer { text-align:center; margin-top:48px; padding-top:22px; border-top:1px solid var(--border); font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dd); line-height:2.2; }

/* ═══ ADMIN ═══════════════════════════════════════ */
.a-header { padding:24px 0 22px; border-bottom:1.5px solid var(--border); margin-bottom:28px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.a-logo-wrap { background:var(--green); display:inline-block; padding:8px 16px; border-radius:10px; margin-bottom:10px; }
.a-logo-wrap img { width:140px; height:auto; display:block; }
.a-title { font-family:var(--ff-display); font-size:26px; font-weight:400; color:var(--green); margin-bottom:3px; }
.a-title span { font-style:italic; opacity:0.75; }
.a-sub { font-size:12px; color:var(--text-d); margin-top:2px; }
.a-actions { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }

.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:100px; border:none; cursor:pointer; font-family:var(--ff-body); font-size:12px; font-weight:500; letter-spacing:0.02em; transition:all 0.2s ease; white-space:nowrap; }
.btn-primary { background:var(--green); color:#fff; border:1.5px solid var(--green); }
.btn-primary:hover { background:var(--green-l); border-color:var(--green-l); transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,110,81,0.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-lib { background:#fff; color:var(--green); border:1.5px solid var(--border-h); }
.btn-lib:hover { background:var(--green-pale); border-color:var(--green); transform:translateY(-1px); }
.btn-lib:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-ghost { background:#fff; color:var(--green); border:1.5px solid var(--border); }
.btn-ghost:hover { background:var(--green-pale); border-color:var(--border-h); }

.section-label { font-size:9.5px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:var(--text-dd); margin-bottom:12px; }
.flavor-list { display:flex; flex-direction:column; gap:7px; }

.f-row { display:flex; align-items:center; gap:11px; background:#fff; border:1.5px solid var(--border); border-radius:var(--r); padding:10px 14px; transition:border-color 0.2s, background 0.2s; }
.f-row.on { border-color:var(--green); background:var(--green-pale); }
.f-row.dragging { opacity:0.4; border-style:dashed; }
.f-row.drag-over { border-color:var(--green-l); background:var(--green-pale2); transform:scale(1.01); }

.drag-handle { cursor:grab; font-size:15px; color:var(--text-dd); flex-shrink:0; padding:0 2px; line-height:1; transition:color 0.18s; user-select:none; }
.drag-handle:hover { color:var(--green); }
.drag-handle:active { cursor:grabbing; }

.tog { position:relative; width:38px; height:21px; flex-shrink:0; cursor:pointer; }
.tog input { position:absolute; opacity:0; width:0; height:0; }
.tog-track { position:absolute; inset:0; background:rgba(0,110,81,0.15); border-radius:24px; transition:background 0.25s; }
.tog input:checked ~ .tog-track { background:var(--green); }
.tog-thumb { position:absolute; top:2.5px; left:2.5px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 1px 4px rgba(0,0,0,.2); }
.tog input:checked ~ .tog-track .tog-thumb { transform:translateX(17px); }

.f-row-dot { width:22px; height:22px; border-radius:50%; flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.15); }
.f-info { flex:1; min-width:0; }
.f-name { font-family:var(--ff-display); font-size:17px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--green); }
.f-desc { font-size:10.5px; color:var(--text-d); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.f-badges { display:flex; flex-wrap:wrap; gap:3px; flex-shrink:0; max-width:220px; }
.f-btns { display:flex; gap:4px; flex-shrink:0; }
.ico-btn { width:28px; height:28px; border-radius:7px; background:#fff; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; transition:all 0.18s; }
.ico-btn:hover { background:var(--green-pale); border-color:var(--border-h); }
.ico-btn.del:hover { background:rgba(220,60,60,.08); border-color:rgba(220,60,60,.4); }

/* Modal */
.overlay { position:fixed; inset:0; z-index:999; background:rgba(0,50,35,0.7); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s; }
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal { background:#fff; border:1.5px solid var(--border); border-radius:var(--r-lg); padding:28px; width:100%; max-width:500px; max-height:92vh; overflow-y:auto; animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn{from{opacity:0;transform:scale(0.94) translateY(14px)}to{opacity:1;transform:none}}
.modal-title { font-family:var(--ff-display); font-size:24px; font-weight:400; margin-bottom:20px; color:var(--green); }
.fgroup { margin-bottom:14px; }
.fgroup label { display:block; font-size:9.5px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-d); margin-bottom:6px; }
.fgroup input, .fgroup textarea { width:100%; background:#fff; border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:var(--ff-body); font-size:13px; font-weight:300; outline:none; transition:border-color 0.2s; }
.fgroup input::placeholder, .fgroup textarea::placeholder { color:var(--text-dd); }
.fgroup input:focus, .fgroup textarea:focus { border-color:var(--green); }
.fgroup textarea { resize:vertical; min-height:68px; }
.swatch-row { display:flex; gap:6px; flex-wrap:wrap; }
.swatch-opt { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform 0.15s, border-color 0.15s; }
.swatch-opt:hover { transform:scale(1.18); }
.swatch-opt.sel { border-color:var(--green); transform:scale(1.18); }
.alg-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.alg-item { display:flex; align-items:center; gap:6px; background:#fff; border:1.5px solid var(--border); border-radius:7px; padding:6px 9px; cursor:pointer; font-size:11px; color:var(--text); transition:all 0.18s; user-select:none; }
.alg-item:hover { background:var(--green-pale); border-color:var(--border-h); }
.alg-item.on { border-color:var(--green); background:var(--green-pale); }
.alg-item input { accent-color:var(--green); cursor:pointer; }
.modal-foot { display:flex; justify-content:flex-end; gap:8px; margin-top:22px; }

/* QR */
.qr-wrap { text-align:center; }
.qr-wrap .modal-title { margin-bottom:8px; }
.qr-sub { font-size:12.5px; color:var(--text-d); margin-bottom:22px; }
#qr-box { background:#fff; display:inline-block; padding:14px; border-radius:10px; border:1.5px solid var(--border); }
.qr-url { margin-top:14px; font-size:10px; color:var(--text-d); word-break:break-all; padding:8px 12px; background:var(--green-pale); border:1.5px solid var(--border); border-radius:7px; }

/* Setup */
.setup-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; background:#fff; }
.setup-card { background:#fff; border:1.5px solid var(--border); border-radius:22px; padding:40px 34px; max-width:460px; width:100%; }
.setup-card h2 { font-family:var(--ff-display); font-size:28px; font-weight:400; color:var(--green); margin-bottom:6px; }
.setup-card .sub { font-size:12.5px; color:var(--text-d); line-height:1.75; margin-bottom:24px; }
.setup-steps { margin-bottom:24px; }
.s-step { display:flex; gap:13px; padding:10px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-d); line-height:1.65; }
.s-step:last-child { border-bottom:none; }
.s-num { font-family:var(--ff-display); font-size:20px; font-weight:400; color:var(--green); flex-shrink:0; width:20px; margin-top:-2px; }
code { background:var(--green-pale); padding:2px 6px; border-radius:4px; font-size:10px; color:var(--green-d); border:1px solid var(--border); }

/* Toast */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#fff; border:1.5px solid var(--border); border-radius:100px; padding:10px 20px; font-size:12.5px; z-index:1200; display:none; align-items:center; gap:7px; box-shadow:0 6px 28px rgba(0,110,81,0.15); white-space:nowrap; color:var(--green); }
.toast.show { display:flex; animation:popIn 0.3s ease; }
.toast.ok  { border-color:var(--green); color:var(--green); }
.toast.err { border-color:rgba(200,60,60,0.5); color:#C03030; }
.toast.inf { border-color:var(--border-h); color:var(--text-d); }

@media(max-width:640px){
  .a-header{flex-direction:column}
  .f-row{flex-wrap:wrap}
  .f-badges{max-width:100%;order:5}
  .f-btns{order:4}
  .alg-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:22px 16px}
  .setup-card{padding:28px 18px}
  .flavor-grid{grid-template-columns:repeat(2,1fr);gap:8px}
}
@media(min-width:641px){
  .flavor-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
}
</style>
</head>

      db.ref('pos/flavors').once('value').then(function(snap) {
        var data = snap.val();
        if (data) resolve(data);
        else resolve({ flavors: [], lastUpdated: null });
      }).catch(reject);
    });
  });
}

async function pushMenu(data) {
  return new Promise(function(resolve, reject) {
    onFbReady(function(db) {
      db.ref('pos/flavors').set(data).then(function() {
        // Verify write succeeded
        db.ref('pos/flavors/lastUpdated').once('value').then(function(snap) {
          if (snap.val()) resolve();
          else reject(new Error('Verificación fallida'));
        }).catch(reject);
      }).catch(reject);
    });
  });
}

/* ── State ───────────────────────────────────────── */
let flavors=[];

/* ── Helpers ─────────────────────────────────────── */
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
function fmtTime(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function uid(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Math.random().toString(36).slice(2,6)}

let _tt;
function toast(msg,type='inf'){
  const el=document.getElementById('toast');
  el.className=`toast show ${type}`;
  el.innerHTML=`<span>${type==='ok'?'✓':type==='err'?'✕':'·'}</span> ${msg}`;
  clearTimeout(_tt);if(type!=='inf')_tt=setTimeout(()=>el.classList.remove('show'),3200);
}
function badge(key){
  const special={sugarfree:'Sin Azúcar',vegan:'🌿 Vegano',sorbet:'💧 Sorbete',favorite:'⭐ Favorito Verdi'};
  if(special[key]) return`<span class="badge b-${key}">${special[key]}</span>`;
  return`<span class="badge">${ALLERGENS[key]||key}</span>`;
}

/* ── Admin View ──────────────────────────────────── */
function renderAdmin(data){
  flavors=(data.flavors&&data.flavors.length>0)?data.flavors:DEFAULT_FLAVORS;
  drawAdmin(data.lastUpdated);
}

function drawAdmin(lastUpdated){
  const on=flavors.filter(f=>f.available).length;
  document.getElementById('app').innerHTML=`
    <div class="page">
      <div class="a-header">
        <div>
          <div class="a-logo-wrap">${LOGO_IMG}</div>
          <div class="a-title">Administración del <span>Menú</span> Diario</div>
          <div class="a-sub">${on} de ${flavors.length} sabores activos hoy
            ${lastUpdated?`· guardado a las ${fmtTime(lastUpdated)}`:'· no guardado hoy todavía'}</div>
        </div>
        <div class="a-actions">
          <button class="btn btn-ghost" onclick="showQR()">📱 Código QR</button>
          <button class="btn btn-ghost" onclick="openAdd()">+ Añadir Sabor</button>
          <button class="btn btn-ghost" onclick="sortAZ()" title="Ordenar alfabéticamente">A→Z</button>
          <a href="index.html" style="padding:8px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);color:#fff;text-decoration:none;font-size:13px;font-weight:600;">← POS</a> <button class="btn btn-lib" id="lib-btn" onclick="saveLibrary()" title="Guarda los sabores sin publicar el menú de hoy">💾 Guardar Biblioteca</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveMenu()">✅ Guardar Menú de Hoy</button>
        </div>
      </div>
      <div class="section-label">Biblioteca de sabores — activa los disponibles hoy</div>
      <div class="flavor-list" id="flist">${flavors.map(rowHTML).join('')}</div>
      <div class="c-footer">Verdi Admin &nbsp;·&nbsp; 💾 Guardar Biblioteca = guarda sabores sin publicar &nbsp;·&nbsp; ✅ Guardar Menú de Hoy = publica a los clientes</div>
    </div>`;
}

function rowHTML(f){
  return`<div class="f-row ${f.available?'on':''}" id="row-${f.id}" draggable="true"
    ondragstart="dragStart(event,'${f.id}')"
    ondragover="dragOver(event)"
    ondragleave="dragLeave(event)"
    ondrop="dragDrop(event,'${f.id}')"
    ondragend="dragEnd(event)">
    <span class="drag-handle" title="Arrastra para reordenar">⠿</span>
    <label class="tog"><input type="checkbox" ${f.available?'checked':''} onchange="toggle('${f.id}',this.checked)">
    <div class="tog-track"><div class="tog-thumb"></div></div></label>
    <div class="f-row-dot" style="background:hsl(${f.h||'100,44%,48%'})"></div>
    <div class="f-info">
      <div class="f-name">${f.name}</div>
      <div class="f-desc">${f.description}</div>
    </div>
    <div class="f-badges">${(f.allergens||[]).length>0?f.allergens.map(badge).join(''):'<span style="font-size:10px;color:rgba(255,255,255,0.6)">Ninguno</span>'}</div>
    <div class="f-btns">
      <button class="ico-btn" title="Editar" onclick="openEdit('${f.id}')">✏️</button>
      <button class="ico-btn del" title="Eliminar" onclick="deleteFlavor('${f.id}')">🗑</button>
    </div>
  </div>`;
}

function toggle(id,val){
  const f=flavors.find(x=>x.id===id);if(f)f.available=val;
  const row=document.getElementById(`row-${id}`);if(row)row.classList.toggle('on',val);
  const on=flavors.filter(f=>f.available).length;
  const sub=document.querySelector('.a-sub');
  if(sub){const saved=sub.textContent.includes('guardado a las')?` · guardado a las ${sub.textContent.split('guardado a las ')[1]}`:' · no guardado hoy todavía';sub.textContent=`${on} de ${flavors.length} sabores activos hoy${saved}`;}
}

/* ── Sort A-Z ─────────────────────────────────────── */
function sortAZ(){
  flavors.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  document.getElementById('flist').innerHTML=flavors.map(rowHTML).join('');
  toast('Ordenado de A a Z — guarda para conservar el orden.','inf');
}

/* ── Drag & Drop reorder ──────────────────────────── */
let dragId=null;
function dragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>document.getElementById(`row-${id}`)?.classList.add('dragging'),0);
}
function dragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.f-row').forEach(r=>r.classList.remove('drag-over'));
}
function dragDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragId||dragId===targetId)return;
  const fromIdx=flavors.findIndex(f=>f.id===dragId);
  const toIdx=flavors.findIndex(f=>f.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=flavors.splice(fromIdx,1);
  flavors.splice(toIdx,0,moved);
  document.getElementById('flist').innerHTML=flavors.map(rowHTML).join('');
  dragId=null;
}

/* ── Save Menu (publishes to customers) ──────────── */
async function saveMenu(){
  const btn=document.getElementById('save-btn');btn.disabled=true;toast('Guardando menú…','inf');
  try{
    await pushMenu({flavors,lastUpdated:new Date().toISOString()});
    toast('¡Menú publicado! Los clientes ya pueden verlo.','ok');
    const now=new Date().toISOString();
    const sub=document.querySelector('.a-sub');
    if(sub)sub.textContent=`${flavors.filter(f=>f.available).length} de ${flavors.length} sabores activos hoy · guardado a las ${fmtTime(now)}`;
  }catch(e){
    console.error(e);
    showApiError(e.message);
  }
  finally{btn.disabled=false;}
}

/* ── Save Library (saves flavors without publishing menu) ── */
async function saveLibrary(){
  const btn=document.getElementById('lib-btn');btn.disabled=true;toast('Guardando biblioteca…','inf');
  try{
    // Preserve lastUpdated when saving library only
    var lastUpdated = null;
    try { var current = await fetchMenu(); lastUpdated = current.lastUpdated; } catch(e) {}
    await pushMenu({flavors, lastUpdated});
    toast('¡Biblioteca guardada! El menú publicado no ha cambiado.','ok');
  }catch(e){
    console.error(e);
    showApiError(e.message);
  }
  finally{btn.disabled=false;}
}

function showApiError(errMsg){
  openModal(`
    <div class="modal-title">Error al guardar</div>
    ${errMsg?`<div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:rgba(255,255,255,0.7);word-break:break-all;font-family:monospace">${errMsg}</div>`:''}
    <p style="font-size:13px;color:var(--white-d);margin-bottom:20px;line-height:1.7">
      Error al guardar en Firebase. Por favor comprueba tu conexión a internet e inténtalo de nuevo.
    </p>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="closeModal();saveLibrary()">Reintentar</button>
    </div>`);
}

/* ── Modals ───────────────────────────────────────── */
let _modal;
function openModal(html){closeModal();const ov=document.createElement('div');ov.className='overlay';ov.innerHTML=`<div class="modal">${html}</div>`;ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);_modal=ov;}
function closeModal(){if(_modal){_modal.remove();_modal=null;}}

function flavorForm(f){
  const isEdit=!!f;f=f||{name:'',description:'',allergens:[],h:'100,44%,48%'};
  return`<div class="modal-title">${isEdit?'Editar Sabor':'Nuevo Sabor'}</div>
    <div class="fgroup"><label>Nombre del Sabor</label><input id="fn" type="text" value="${f.name}" placeholder="p.ej. Pistacho Crujiente"></div>
    <div class="fgroup"><label>Descripción</label><textarea id="fd" placeholder="Una línea sobre este sabor…">${f.description}</textarea></div>
    <div class="fgroup"><label>Color</label>
      <div class="swatch-row">${SWATCH_HUES.map(h=>`<div class="swatch-opt ${h===(f.h||SWATCH_HUES[3])?'sel':''}" style="background:hsl(${h})" onclick="pickHue(this,'${h}')"></div>`).join('')}</div>
      <input type="hidden" id="fh" value="${f.h||SWATCH_HUES[3]}">
    </div>
    <div class="fgroup"><label>Alérgenos (UE 14) — marca todos los que correspondan</label>
      <div style="font-size:10px;color:var(--text-dd);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">Atributos especiales</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${['sugarfree','vegan','sorbet','favorite'].map(k=>`
          <label class="alg-item ${(f.allergens||[]).includes(k)?'on':''}" style="flex:0 0 auto">
            <input type="checkbox" value="${k}" ${(f.allergens||[]).includes(k)?'checked':''} onchange="this.closest('.alg-item').classList.toggle('on',this.checked)">
            ${{sugarfree:'Sin Azúcar',vegan:'🌿 Vegano',sorbet:'💧 Sorbete',favorite:'⭐ Favorito Verdi'}[k]}</label>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--text-dd);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">Alérgenos</div>
      <div class="alg-grid">${Object.entries(ALLERGENS).filter(([k])=>!['sugarfree','vegan','sorbet','favorite'].includes(k)).map(([k,v])=>`
        <label class="alg-item ${(f.allergens||[]).includes(k)?'on':''}">
          <input type="checkbox" value="${k}" ${(f.allergens||[]).includes(k)?'checked':''} onchange="this.closest('.alg-item').classList.toggle('on',this.checked)">${v}</label>`).join('')}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveFlavor('${isEdit?f.id:''}')">${isEdit?'Guardar Cambios':'Añadir Sabor'}</button>
    </div>`;
}
function pickHue(el,h){document.querySelectorAll('.swatch-opt').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');document.getElementById('fh').value=h;}
function openAdd(){openModal(flavorForm(null));}
function openEdit(id){openModal(flavorForm(flavors.find(f=>f.id===id)));}
function saveFlavor(existingId){
  const name=document.getElementById('fn').value.trim();const desc=document.getElementById('fd').value.trim();const h=document.getElementById('fh').value||'100,44%,48%';
  const allergens=[...document.querySelectorAll('.alg-item input:checked')].map(x=>x.value);
  if(!name){alert('Please enter a flavor name.');return;}
  if(existingId){const i=flavors.findIndex(f=>f.id===existingId);if(i>-1)Object.assign(flavors[i],{name,description:desc,h,allergens});}
  else{flavors.push({id:uid(name),name,description:desc,h,allergens,available:false});}
  closeModal();document.getElementById('flist').innerHTML=flavors.map(rowHTML).join('');
}
function deleteFlavor(id){if(!confirm('¿Eliminar este sabor de la biblioteca?'))return;flavors=flavors.filter(f=>f.id!==id);document.getElementById('flist').innerHTML=flavors.map(rowHTML).join('');}

/* ── QR Code ─────────────────────────────────────── */
function showQR(){
  const url=location.origin+location.pathname.replace(/\/?(index\.html)?$/,'');
  openModal(`<div class="qr-wrap">
    <div class="modal-title">Código QR para Clientes</div>
    <div class="qr-sub">Publícalo en Instagram o muéstralo en el mostrador.<br>El mismo código cada día — solo cambia el contenido.</div>
    <div id="qr-box"></div>
    <div class="qr-url">${url}</div>
    <div class="modal-foot" style="justify-content:center;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
    </div>
  </div>`);
  setTimeout(()=>{new QRCode(document.getElementById('qr-box'),{text:url,width:200,height:200,colorDark:'#005540',colorLight:'#ffffff'});},60);
}

/* ── Setup Screen ────────────────────────────────── */
function renderSetup(){
  document.getElementById('app').innerHTML=`
    <div class="setup-wrap"><div class="setup-card">
      <div class="a-logo-wrap" style="margin-bottom:20px;display:inline-block">${LOGO_IMG}</div>
      <h2>Clave API</h2>

        <label>X-Master-Key</label>
        <input type="password" id="s-key" placeholder="$2a$10$…" autocomplete="off">
      </div>

async function doSetup(){

function showLoading(msg='Loading…'){
  document.getElementById('app').innerHTML=`<div class="loading"><div class="spinner"></div><div style="font-size:12.5px;color:rgba(255,255,255,0.6)">${msg}</div></div>`;
}

/* ── Init ────────────────────────────────────────── */
async function init(){
  if(WRONG_PIN){
    // Wrong PIN — show customer view silently
    document.getElementById('app').innerHTML='';
    const id=BIN_ID;
    showLoading('Cargando el menú de hoy…');try{renderCustomer(await fetchMenu());}catch(e){console.warn('Failed to load menu',e);}
    return;
  }
  if(IS_ADMIN){
    const cfg=getCfg();
    if(!cfg.apiKey){renderSetup();return;}
    showLoading('Cargando biblioteca de sabores…');
    try{renderAdmin(await fetchMenu());}
    catch(e){console.warn('Seeding defaults:',e);renderAdmin({flavors:DEFAULT_FLAVORS,lastUpdated:null});}
  }else{
    const id=BIN_ID||getCfg().binId;
    if(!id){document.getElementById('app').innerHTML=`<div class="page"><div class="c-header"><div class="verdi-logo">${LOGO_IMG}</div><div class="eyebrow">Boadilla del Monte · Madrid</div><div class="c-tagline"><em>Today's</em> Flavors</div></div><div class="flavor-grid"><div class="empty"><div class="ice">🍦</div><h2>Próximamente</h2><p>El menú de hoy aparecerá aquí en breve.</p></div></div></div>`;return;}
    showLoading('Cargando el menú de hoy…');
    try{renderCustomer(await fetchMenu());}
    catch(e){document.getElementById('app').innerHTML=`<div class="page"><div class="c-header"><div class="verdi-logo">${LOGO_IMG}</div><div class="c-tagline"><em>Today's</em> Flavors</div></div><div class="flavor-grid"><div class="empty"><div class="ice">🍦</div><h2>Menú no disponible</h2><p>Consulta con un miembro del equipo — lo solucionaremos enseguida.</p></div></div></div>`;}
  }
}

init();
</script>
