<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Verdi VIP">
<meta name="theme-color" content="#1a1a1a">
<title>Verdi VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#111;color:#fff;font-family:"DM Sans",sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;}

/* Silver foil effect */
.silver{background:linear-gradient(135deg,#777 0%,#fff 25%,#ccc 45%,#fff 65%,#888 85%,#ccc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.silver-border{border:1px solid;border-image:linear-gradient(135deg,#555,#aaa,#555) 1;}

/* Loading */
.loading{text-align:center;color:#555;font-size:13px;letter-spacing:2px;text-transform:uppercase;}

/* The card */
.vip-card{
  width:100%;max-width:380px;
  background:#1a1a1a;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 32px 100px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  border:1px solid #2a2a2a;
  position:relative;
}

/* Subtle texture overlay */
.vip-card::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 1px,rgba(255,255,255,0.008) 1px,rgba(255,255,255,0.008) 2px);
  pointer-events:none;
}

.card-front{padding:44px 24px 22px;}

.logo-wrap{text-align:center;padding-top:10px;margin-bottom:8px;}
.logo-wrap img{width:260px;filter:drop-shadow(0 2px 12px rgba(255,255,255,0.12));}
.helados{font-size:9px;letter-spacing:6px;text-transform:uppercase;color:#666;text-align:center;margin-bottom:24px;}

.divider-line{width:100%;height:1px;background:linear-gradient(to right,transparent,#333,transparent);margin:20px 0;}

.member-name{
  font-family:"Cormorant Garamond",serif;
  font-size:20px;font-weight:400;
  letter-spacing:3px;text-transform:uppercase;
  text-align:center;
  background:linear-gradient(135deg,#888 0%,#fff 40%,#ccc 60%,#fff 75%,#888 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.member-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#555;text-align:center;margin-bottom:20px;}

.vip-number-wrap{
  text-align:center;
  background:linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.06));
  border:1px solid #2a2a2a;
  border-radius:2px;
  padding:14px;
  margin-bottom:0;
}
.vip-label{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:#555;margin-bottom:6px;}
.vip-num{
  font-family:"Cormorant Garamond",serif;
  font-size:36px;font-weight:300;letter-spacing:8px;
  background:linear-gradient(135deg,#777 0%,#fff 30%,#ccc 50%,#fff 70%,#888 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Card back / footer */
.card-back{
  background:#161616;
  border-top:1px solid #222;
  padding:16px 32px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.address{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;text-align:center;line-height:1.8;}
.tagline{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(to right,#555,#888,#555);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-top:8px;
}

/* Add to home screen hint */
.hint{
  margin-top:28px;text-align:center;
  font-size:11px;letter-spacing:1px;color:#444;
  max-width:260px;line-height:1.7;
}
.hint strong{color:#666;}

/* Error */
.error-state{text-align:center;color:#666;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:40px;}
@media(max-width:480px){
  body{padding:0;justify-content:flex-start;}
  .vip-card{max-width:100%;border-radius:0;min-height:100vh;display:flex;flex-direction:column;}
  .card-front{padding:40px 24px 24px;flex:1;}
  .vip-num{font-size:30px;letter-spacing:5px;}
  .member-name{font-size:18px;}
  .hint{padding:0 20px 32px;}
}
</style>
</head>

function pad(n, digits) {

async function loadCard() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get("id");

  if (!id) {
    document.getElementById("app").innerHTML = '<div class="error-state">Tarjeta no encontrada.<br><br><a href="verdi-vip-register.html" style="color:#666;letter-spacing:2px;font-size:11px;text-transform:uppercase;">Regístrate aquí</a></div>';
    return;
  }

  try {
    var res = await fetch(DB + "/pos/vip/" + id + ".json");
    var c = await res.json();

    if (!c) {
      document.getElementById("app").innerHTML = '<div class="error-state">Tarjeta no encontrada.<br><br><a href="verdi-vip-register.html" style="color:#666;letter-spacing:2px;font-size:11px;text-transform:uppercase;">Regístrate aquí</a></div>';
      return;
    }

    document.title = "Verdi VIP — " + c.name;

    document.getElementById("app").innerHTML =
