<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verdi VIP — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#006E51;--green-light:#e0f2ed;--text:#1a2e25;--gray:#6b7f78;--gray-light:#e8edeb;--red:#ef4444;--radius:12px;}
body{font-family:"DM Sans",sans-serif;background:#f5f9f7;color:var(--text);min-height:100vh;}
.page{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
h1 em{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--green);}
.subtitle{font-size:13px;color:var(--gray);margin-bottom:24px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:#fff;border:1.5px solid var(--gray-light);border-radius:var(--radius);padding:16px;}
.stat-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:800;color:var(--green);}
.search-bar{display:flex;gap:10px;margin-bottom:20px;}
.search-bar input{flex:1;padding:10px 16px;border:1.5px solid var(--gray-light);border-radius:24px;font-family:"DM Sans",sans-serif;font-size:14px;background:#fff;outline:none;}
.search-bar input:focus{border-color:var(--green);}
.sort-select{padding:10px 14px;border:1.5px solid var(--gray-light);border-radius:24px;font-family:"DM Sans",sans-serif;font-size:13px;background:#fff;outline:none;cursor:pointer;}
.table-wrap{background:#fff;border:1.5px solid var(--gray-light);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);background:#f9fbfa;border-bottom:1.5px solid var(--gray-light);text-align:left;cursor:pointer;}
td{padding:12px 16px;border-bottom:1px solid #f5f5f5;font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fbfa;}
.vip-badge{display:inline-block;background:#1a1a1a;color:#ccc;font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:3px;}
.name-cell{font-weight:600;}
.phone-cell{color:var(--gray);font-size:12px;}
.spent-cell{font-weight:700;color:var(--green);}
.visits-cell{color:var(--gray);}
.date-cell{font-size:11px;color:#aaa;}
.notes-input{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;font-family:"DM Sans",sans-serif;font-size:12px;color:var(--gray);padding:2px 0;outline:none;max-width:160px;}
.notes-input:focus{border-bottom-color:var(--green);}
.reward-btn{padding:4px 10px;border-radius:8px;border:none;background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px;}
.reward-btn:hover{background:#fde68a;}
.link-btn{padding:4px 10px;border-radius:8px;border:1px solid var(--gray-light);background:#fff;color:var(--gray);font-size:11px;cursor:pointer;text-decoration:none;display:inline-block;}
.link-btn:hover{border-color:var(--green);color:var(--green);}
.empty{text-align:center;color:var(--gray);padding:40px;font-size:14px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:400px;box-shadow:0 24px 80px rgba(0,0,0,0.2);}
.modal-box h3{font-size:18px;font-weight:700;margin-bottom:16px;}
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.form-field label{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.form-field input,.form-field select,.form-field textarea{padding:9px 12px;border:1.5px solid var(--gray-light);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--green);}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:9px 18px;border-radius:20px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:#fff;color:var(--text);}
.btn.green{background:var(--green);color:#fff;border-color:var(--green);}
</style>
</head>

<div class="page">
  <h1>👑 Club <em>VIP</em> · Verdi</h1>
  <div class="subtitle" id="subtitle">Cargando miembros...</div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Miembros</div><div class="stat-value" id="statMembers">—</div></div>
    <div class="stat"><div class="stat-label">Gasto Total</div><div class="stat-value" id="statSpent">—</div></div>
    <div class="stat"><div class="stat-label">Ticket Medio VIP</div><div class="stat-value" id="statAvg">—</div></div>
    <div class="stat"><div class="stat-label">Rewards Dados</div><div class="stat-value" id="statRewards">—</div></div>
  </div>

  <div class="search-bar">
    <input id="searchBox" placeholder="🔍 Buscar por nombre, teléfono o número VIP..." oninput="renderTable()">
    <select class="sort-select" id="sortSelect" onchange="renderTable()">
      <option value="joinedAt">Fecha registro</option>
      <option value="totalSpent">Mayor gasto</option>
      <option value="visits">Más visitas</option>
      <option value="vipNumber">Número VIP</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nº VIP</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Gasto Total</th>
          <th>Visitas</th>
          <th>Rewards</th>
          <th>Desde</th>
          <th>Notas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Reward modal -->
<div class="modal-overlay" id="rewardModal">
  <div class="modal-box">
    <h3>🎁 Registrar Premio</h3>
    <div class="form-field">
      <label>Miembro</label>
      <input type="text" id="rewardMember" readonly style="background:#f5f5f5;">
    </div>
    <div class="form-field">
      <label>Premio entregado</label>
      <select id="rewardType">
        <option>Small gratis</option>
        <option>Medium gratis</option>
        <option>Large gratis</option>
        <option>½ Litro gratis</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="form-field">
      <label>Nota (opcional)</label>
      <textarea id="rewardNote" rows="2" placeholder="Ej: Por fidelidad, cumpleaños..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeRewardModal()">Cancelar</button>
      <button class="btn green" onclick="saveReward()">Guardar premio</button>
    </div>
  </div>
</div>

<script>
var DB = "https://verdi-boadilla---pos-default-rtdb.europe-west1.firebasedatabase.app";
var members = [];
var rewardTarget = null;

async function load() {
  try {
    var res = await fetch(DB + "/pos/vip.json");
    var data = await res.json() || {};
    members = Object.values(data).filter(function(m){ return m && m.name; });
    renderStats();
    renderTable();
    document.getElementById("subtitle").textContent = members.length + " miembros · Actualizado " + new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  } catch(e) {
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="9" class="empty">Error de conexión.</td></tr>';
  }
}

function renderStats() {
  var totalSpent = members.reduce(function(s,m){return s+(m.totalSpent||0);},0);
  var totalVisits = members.reduce(function(s,m){return s+(m.visits||0);},0);
  var totalRewards = members.reduce(function(s,m){return s+(m.rewardsClaimed||0);},0);
  document.getElementById("statMembers").textContent = members.length;
  document.getElementById("statSpent").textContent = "€" + totalSpent.toFixed(0);
  document.getElementById("statAvg").textContent = totalVisits > 0 ? "€" + (totalSpent/totalVisits).toFixed(2) : "—";
  document.getElementById("statRewards").textContent = totalRewards;
}

function renderTable() {
  var q = document.getElementById("searchBox").value.toLowerCase();
  var sortBy = document.getElementById("sortSelect").value;

  var filtered = members.filter(function(m){
    return !q || m.name.toLowerCase().includes(q) || (m.phone||"").includes(q) || String(m.vipNumber).includes(q);
  });

  filtered.sort(function(a,b){
    if(sortBy==="totalSpent") return (b.totalSpent||0)-(a.totalSpent||0);
    if(sortBy==="visits") return (b.visits||0)-(a.visits||0);
    if(sortBy==="vipNumber") return (a.vipNumber||0)-(b.vipNumber||0);
    return (b.joinedAt||"").localeCompare(a.joinedAt||"");
  });

  if(filtered.length===0){
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="9" class="empty">No se encontraron miembros.</td></tr>';
    return;
  }

  var tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  filtered.forEach(function(m) {
    var joined = m.joinedAt ? new Date(m.joinedAt).toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"2-digit"}) : "—";
    var numStr = "VIP·" + String(m.vipNumber).padStart(3,"0");

    var tr = document.createElement("tr");

    // VIP number
    var td1 = document.createElement("td");
    td1.innerHTML = '<span class="vip-badge">' + numStr + '</span>';
    tr.appendChild(td1);

    // Name
    var td2 = document.createElement("td");
    td2.className = "name-cell";
    td2.textContent = m.name;
    tr.appendChild(td2);

    // Phone
    var td3 = document.createElement("td");
    td3.className = "phone-cell";
    td3.textContent = m.phone || "—";
    tr.appendChild(td3);

    // Spent
    var td4 = document.createElement("td");
    td4.className = "spent-cell";
    td4.textContent = "€" + (m.totalSpent||0).toFixed(2);
    tr.appendChild(td4);

    // Visits
    var td5 = document.createElement("td");
    td5.className = "visits-cell";
    td5.textContent = m.visits || 0;
    tr.appendChild(td5);

    // Rewards
    var td6 = document.createElement("td");
    td6.textContent = m.rewardsClaimed || 0;
    tr.appendChild(td6);

    // Date
    var td7 = document.createElement("td");
    td7.className = "date-cell";
    td7.textContent = joined;
    tr.appendChild(td7);

    // Notes
    var td8 = document.createElement("td");
    var noteInput = document.createElement("input");
    noteInput.type = "text";
    noteInput.className = "notes-input";
    noteInput.value = m.notes || "";
    noteInput.placeholder = "Añadir nota...";
    noteInput.dataset.phone = m.phone;
    noteInput.addEventListener("blur", function(){
      saveNote(this.dataset.phone, this.value);
    });
    td8.appendChild(noteInput);
    tr.appendChild(td8);

    // Actions
    var td9 = document.createElement("td");
    td9.style.display = "flex";
    td9.style.gap = "6px";
    td9.style.flexWrap = "wrap";

    var rewardBtn = document.createElement("button");
    rewardBtn.className = "reward-btn";
    rewardBtn.textContent = "🎁 Premio";
    rewardBtn.dataset.phone = m.phone;
    rewardBtn.dataset.name = m.name;
    rewardBtn.addEventListener("click", function(){
      openReward(this.dataset.phone, this.dataset.name);
    });
    td9.appendChild(rewardBtn);

    var cardLink = document.createElement("a");
    cardLink.className = "link-btn";
    cardLink.href = "verdi-vip-card.html?id=" + m.phone;
    cardLink.target = "_blank";
    cardLink.textContent = "Ver tarjeta";
    td9.appendChild(cardLink);

    tr.appendChild(td9);
    tbody.appendChild(tr);
  });
}

async function saveNote(phone, note) {
  await fetch(DB + "/pos/vip/" + phone + "/notes.json", {
    method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(note)
  });
  var m = members.find(function(x){return x.phone===phone;});
  if(m) m.notes = note;
}

function openReward(phone, name) {
  rewardTarget = phone;
  document.getElementById("rewardMember").value = name;
  document.getElementById("rewardNote").value = "";
  document.getElementById("rewardModal").classList.add("show");
}

function closeRewardModal() {
  document.getElementById("rewardModal").classList.remove("show");
}

async function saveReward() {
  var type = document.getElementById("rewardType").value;
  var note = document.getElementById("rewardNote").value.trim();
  var m = members.find(function(x){return x.phone===rewardTarget;});
  if(!m) return;
  var rewards = m.rewards || [];
  rewards.push({type:type, note:note, date:new Date().toISOString()});
  m.rewardsClaimed = (m.rewardsClaimed||0)+1;
  m.rewards = rewards;
  await fetch(DB + "/pos/vip/" + rewardTarget + ".json", {
    method:"PATCH", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({rewardsClaimed:m.rewardsClaimed, rewards:rewards})
  });
  closeRewardModal();
  renderStats();
  renderTable();
}

load();
</script>
</body>
</html>
