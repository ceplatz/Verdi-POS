<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verdi — Mensajes al Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#006E51;--green-d:#004d3a;--green-l:#e0f2ed;--text:#1a2e25;--gray:#6b7f78;--gray-light:#e8edeb;--radius:14px;--red:#e05a3a;}
body{font-family:'DM Sans',sans-serif;background:#f5f9f7;color:var(--text);min-height:100vh;}

header{background:linear-gradient(135deg,#004d3a 0%,#006E51 100%);padding:24px 28px 20px;color:#fff;}
.hdr-title{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
.hdr-sub{font-size:13px;opacity:0.7;}

.page{max-width:560px;margin:0 auto;padding:24px 20px 60px;}

/* Sender selector */
.sender-row{display:flex;gap:8px;margin-bottom:20px;}
.sender-btn{flex:1;padding:10px;border-radius:12px;border:2px solid var(--gray-light);background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;text-align:center;}
.sender-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* Quick presets */
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gray);margin-bottom:10px;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.preset-btn{padding:12px 14px;border-radius:12px;border:1.5px solid var(--gray-light);background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.3;}
.preset-btn:hover{border-color:var(--green);background:var(--green-l);}
.preset-btn.selected{border-color:var(--green);background:var(--green-l);color:var(--green-d);}

/* Message input */
.msg-input-wrap{background:#fff;border:1.5px solid var(--gray-light);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.msg-input-wrap:focus-within{border-color:var(--green);}
.msg-textarea{width:100%;min-height:100px;padding:14px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);resize:vertical;outline:none;}
.msg-char{padding:6px 14px;font-size:11px;color:var(--gray);text-align:right;border-top:1px solid var(--gray-light);}

/* Send button */
.btn-send{width:100%;padding:16px;border-radius:12px;border:none;background:var(--green);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-bottom:10px;}
.btn-send:hover{background:var(--green-d);}
.btn-send:disabled{background:var(--gray-light);color:var(--gray);cursor:not-allowed;}
.btn-clear{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--gray-light);background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray);}
.btn-clear:hover{border-color:var(--red);color:var(--red);}

/* Status */
.status-box{border-radius:var(--radius);padding:16px;margin-top:20px;display:none;}
.status-box.show{display:block;}
.status-box.sent{background:#f0faf7;border:1.5px solid #a7f3d0;}
.status-box.seen{background:#e0f2ed;border:1.5px solid #006E51;}
.status-box.cleared{background:#f5f9f7;border:1.5px solid var(--gray-light);}
.status-icon{font-size:28px;margin-bottom:8px;}
.status-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.status-sub{font-size:13px;color:var(--gray);}

/* Active message indicator */
.active-msg-banner{background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;display:none;}
.active-msg-banner.show{display:flex;align-items:center;gap:12px;}
.active-msg-text{flex:1;font-size:13px;font-weight:600;}
.active-msg-sub{font-size:11px;color:var(--gray);margin-top:2px;}
</style>
</head>
<body>

<header>
  <div class="hdr-title">📩 Mensajes al Equipo</div>
  <div class="hdr-sub">Verdi Boadilla · Envía un aviso directo a la tienda</div>
</header>

<div class="page">

  <!-- Active message warning -->
  <div class="active-msg-banner" id="activeBanner">
    <span style="font-size:24px;">⚠️</span>
    <div>
      <div class="active-msg-text" id="activeBannerText">Hay un mensaje activo en pantalla</div>
      <div class="active-msg-sub" id="activeBannerSub">Espera a que el equipo lo confirme, o bórralo</div>
    </div>
  </div>

  <!-- Sender -->
  <div class="section-label">¿Quién envía?</div>
  <div class="sender-row">
    <button class="sender-btn active" onclick="setSender('Rocío')" id="senderRocio">Rocío</button>
    <button class="sender-btn" onclick="setSender('Charles')" id="senderCharles">Charles</button>
  </div>

  <!-- Presets -->
  <div class="section-label">Mensajes rápidos</div>
  <div class="preset-grid" id="presetGrid">
    <button class="preset-btn" onclick="usePreset(this, '📦 Pedido por WhatsApp — confirma con el cliente')">📦 Pedido WhatsApp</button>
    <button class="preset-btn" onclick="usePreset(this, '📞 Llama a Rocío urgente')">📞 Llama a Rocío</button>
    <button class="preset-btn" onclick="usePreset(this, '⏰ Cierra 30 min antes de lo habitual')">⏰ Cierra 30min antes</button>
    <button class="preset-btn" onclick="usePreset(this, '🧹 Limpia la vitrina antes de cerrar')">🧹 Limpia vitrina</button>
    <button class="preset-btn" onclick="usePreset(this, '💰 Haz el corte de caja ahora')">💰 Corte de caja</button>
    <button class="preset-btn" onclick="usePreset(this, '👥 Llega refuerzo en 20 minutos')">👥 Llega refuerzo</button>
  </div>

  <!-- Custom message -->
  <div class="section-label">Mensaje personalizado</div>
  <div class="msg-input-wrap">
    <textarea class="msg-textarea" id="msgInput" placeholder="Escribe aquí tu mensaje para el equipo..." maxlength="280" oninput="updateChar()"></textarea>
    <div class="msg-char"><span id="charCount">0</span>/280</div>
  </div>

  <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>📤 Enviar a la tienda</button>
  <button class="btn-clear" id="clearBtn" onclick="clearMessage()" style="display:none;">🗑️ Borrar mensaje activo</button>

  <!-- Status feedback -->
  <div class="status-box" id="statusBox">
    <div class="status-icon" id="statusIcon">⏳</div>
    <div class="status-title" id="statusTitle">Enviando...</div>
    <div class="status-sub" id="statusSub"></div>
  </div>

</div>

<script>
var DB = 'https://verdi-boadilla---pos-default-rtdb.europe-west1.firebasedatabase.app';
var sender = 'Rocío';
var activeListener = null;

function setSender(name) {
  sender = name;
  document.getElementById('senderRocio').classList.toggle('active', name==='Rocío');
  document.getElementById('senderCharles').classList.toggle('active', name==='Charles');
}

function usePreset(btn, text) {
  // Toggle off if already selected
  var allBtns = document.querySelectorAll('.preset-btn');
  allBtns.forEach(function(b){ b.classList.remove('selected'); });
  document.getElementById('msgInput').value = text;
  btn.classList.add('selected');
  updateChar();
}

function updateChar() {
  var val = document.getElementById('msgInput').value;
  document.getElementById('charCount').textContent = val.length;
  document.getElementById('sendBtn').disabled = val.trim().length === 0;
}

function sendMessage() {
  var text = document.getElementById('msgInput').value.trim();
  if (!text) return;

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';

  var payload = {
    text: text,
    sender: sender,
    sentAt: new Date().toISOString(),
    acknowledgedAt: null,
    acknowledgedBy: null
  };

  fetch(DB + '/pos/messages/active.json', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function() {
    btn.textContent = '📤 Enviar a la tienda';
    showStatus('sent', '📤', 'Mensaje enviado', 'Esperando confirmación del equipo...');
    document.getElementById('clearBtn').style.display = 'block';
    listenForAck();
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = '📤 Enviar a la tienda';
    showStatus('sent', '❌', 'Error al enviar', 'Comprueba tu conexión e inténtalo de nuevo');
  });
}

function clearMessage() {
  fetch(DB + '/pos/messages/active.json', {method:'DELETE'})
  .then(function(){
    showStatus('cleared', '🗑️', 'Mensaje borrado', 'El equipo ya no verá el aviso');
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('activeBanner').classList.remove('show');
    document.getElementById('msgInput').value = '';
    updateChar();
    document.querySelectorAll('.preset-btn').forEach(function(b){ b.classList.remove('selected'); });
  });
}

function listenForAck() {
  // Poll every 3 seconds for acknowledgement (simple REST, no SDK needed)
  var interval = setInterval(function() {
    fetch(DB + '/pos/messages/active.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data) {
        // Message cleared (acknowledged and removed)
        clearInterval(interval);
        showStatus('seen', '✅', '¡Mensaje visto!', 'El equipo ha confirmado el mensaje');
        document.getElementById('clearBtn').style.display = 'none';
        document.getElementById('activeBanner').classList.remove('show');
      } else if (data.acknowledgedBy) {
        clearInterval(interval);
        var t = data.acknowledgedAt ? new Date(data.acknowledgedAt).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
        showStatus('seen', '✅', 'Visto por ' + data.acknowledgedBy, t ? 'Confirmado a las ' + t : 'El equipo ha confirmado');
        document.getElementById('clearBtn').style.display = 'none';
      }
    }).catch(function(){});
  }, 3000);
}

function showStatus(type, icon, title, sub) {
  var box = document.getElementById('statusBox');
  box.className = 'status-box show ' + type;
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusSub').textContent = sub;
}

// On load — check if there's already an active message
function checkActive() {
  fetch(DB + '/pos/messages/active.json')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data && data.text && !data.acknowledgedAt) {
      var banner = document.getElementById('activeBanner');
      document.getElementById('activeBannerText').textContent = '"' + data.text + '"';
      var t = data.sentAt ? new Date(data.sentAt).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
      document.getElementById('activeBannerSub').textContent = 'Enviado por ' + (data.sender||'?') + (t?' a las '+t:'') + ' · Esperando confirmación';
      banner.classList.add('show');
      document.getElementById('clearBtn').style.display = 'block';
      // Pre-fill input with active message
      document.getElementById('msgInput').value = data.text;
      updateChar();
      listenForAck();
    }
  }).catch(function(){});
}
checkActive();
</script>
</body>
</html>
