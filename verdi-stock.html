<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verdi — Stock de Suministros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#006E51;--green-light:#e0f2ed;--text:#1a2e25;--gray:#6b7f78;--gray-light:#e8edeb;--red:#ef4444;--amber:#f59e0b;--radius:14px;}
body{font-family:'DM Sans',sans-serif;background:#f5f9f7;color:var(--text);min-height:100vh;}
.page{max-width:860px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
h1 em{font-family:'Montserrat',sans-serif;font-style:normal;font-weight:800;color:var(--green);}
.subtitle{font-size:13px;color:var(--gray);margin-bottom:20px;}
.toolbar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:#fff;color:var(--text);}
.btn.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn.outline{background:transparent;border-color:var(--green);color:var(--green);}
.section-label{font-size:10px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
</style>
<style>
.stock-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border:1.5px solid var(--gray-light);border-radius:var(--radius);margin-bottom:8px;transition:border-color 0.2s;}
.stock-row:hover{border-color:#c8ddd8;}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;transition:background 0.3s;}
.status-dot.green{background:#22c55e;}
.status-dot.amber{background:#f59e0b;}
.status-dot.red{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,0.15);}
.stock-name{font-size:15px;font-weight:600;min-width:180px;flex-shrink:0;}
.stock-unit{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;min-width:60px;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gray-light);background:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray);transition:all 0.15s;}
.qty-btn:hover{border-color:var(--green);color:var(--green);}
.qty-num{font-size:18px;font-weight:700;min-width:24px;text-align:center;}
.status-tag{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;}
.status-tag.ok{background:#dcfce7;color:#166534;}
.status-tag.low{background:#fef3c7;color:#92400e;}
.status-tag.out{background:#fee2e2;color:#991b1b;}
.edit-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;color:var(--gray);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.edit-btn:hover{border-color:var(--green);color:var(--green);}
.order-banner{background:#fff3e0;border:1.5px solid #f5a623;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:none;}
.order-banner.show{display:block;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-field{margin-bottom:14px;}
.modal-field label{font-size:12px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
.modal-field input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-light);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;}
.modal-field input:focus{outline:none;border-color:var(--green);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions button{flex:1;padding:12px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;}
@media print{header,.toolbar,.edit-btn,.qty-btn{display:none!important;}body{background:#fff;}}
</style>
</head><body>

      projectId:'verdi-boadilla---pos',
      storageBucket:'verdi-boadilla---pos.firebasestorage.app',
      messagingSenderId:'421348834098',
      appId:'1:421348834098:web:74b5b979b36ac8cadb752b'
    });
    db=firebase.database();
    db.ref('pos/stock').once('value').then(function(snap){
      var data=snap.val();
      if(data&&data.items&&data.items.length>0){items=data.items;}
      else{var local=localStorage.getItem(STOCK_KEY);if(local){try{items=JSON.parse(local);}catch(e){}}}
      render();
    }).catch(function(){var local=localStorage.getItem(STOCK_KEY);if(local){try{items=JSON.parse(local);}catch(e){}}render();});
  });
});

function getStatus(item){
  if(item.qty===0)return'out';
  if(item.qty<item.ideal)return'low';
  return'ok';
}

function render(){
  var list=document.getElementById('stockList');
  list.innerHTML='';
  var orderItems=[];
  items.forEach(function(item,idx){
    var status=getStatus(item);
    var dotClass=status==='ok'?'green':status==='low'?'amber':'red';
    var tagText=status==='ok'?'✓ OK':status==='low'?'⚠ Bajo':'🔴 Agotado';
    var row=document.createElement('div');
    row.className='stock-row';
    row.innerHTML='<div class="status-dot '+dotClass+'"></div>'+
      '<div class="stock-name">'+item.name+'</div>'+
      '<div class="stock-unit">'+item.unit+'</div>'+
      '<div class="qty-ctrl">'+
        '<button class="qty-btn" data-idx="'+idx+'" data-delta="-1" onclick="adjust(this.dataset.idx,parseInt(this.dataset.delta))">−</button>'+
        '<span class="qty-num">'+item.qty+'</span>'+
        '<button class="qty-btn" data-idx="'+idx+'" data-delta="1" onclick="adjust(this.dataset.idx,parseInt(this.dataset.delta))">+</button>'+
      '</div>'+
      '<span class="status-tag '+status+'">'+tagText+'</span>'+
      '<button class="edit-btn" data-idx="'+idx+'" onclick="openEdit(parseInt(this.dataset.idx))">✏️</button>';
    list.appendChild(row);
    if(status!=='ok')orderItems.push(item.name+': necesita '+(item.ideal-item.qty+1)+' '+item.unit.toLowerCase()+'(s)');
  });
  var banner=document.getElementById('orderBanner');
  if(orderItems.length>0){banner.classList.add('show');document.getElementById('orderList').innerHTML=orderItems.map(function(o){return'• '+o;}).join('<br>');}
  else{banner.classList.remove('show');}
  document.getElementById('subtitle').textContent=items.length+' artículos · Actualizado '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  saveLocal();
}

function adjust(idx,delta){items[parseInt(idx)].qty=Math.max(0,items[parseInt(idx)].qty+delta);render();}
function saveLocal(){try{localStorage.setItem(STOCK_KEY,JSON.stringify(items));}catch(e){}}

function saveStock(){
  saveLocal();
  var btn=document.querySelector('header button:last-child');
  btn.textContent='⏳ Guardando...';btn.disabled=true;
  if(db){
    db.ref('pos/stock').set({items:items,savedAt:new Date().toISOString()}).then(function(){
      btn.textContent='✅ Guardado';setTimeout(function(){btn.textContent='💾 Guardar';btn.disabled=false;},2000);
    }).catch(function(){btn.textContent='❌ Error';btn.disabled=false;});
  }else{btn.textContent='✓ Local';btn.disabled=false;}
}

function sortItems(){items.sort(function(a,b){return a.name.localeCompare(b.name,'es');});render();}

function openEdit(idx){
  editingId=idx;var item=items[idx];
  document.getElementById('modalTitle').textContent='✏️ '+item.name;
  document.getElementById('editName').value=item.name;
  document.getElementById('editUnit').value=item.unit;
  document.getElementById('editIdeal').value=item.ideal;
  document.getElementById('editModal').classList.add('show');
}
function saveModal(){
  var item=items[editingId];
  item.name=document.getElementById('editName').value.trim()||item.name;
  item.unit=document.getElementById('editUnit').value.trim()||item.unit;
  item.ideal=parseInt(document.getElementById('editIdeal').value)||1;
  closeModal();render();
}
function closeModal(){document.getElementById('editModal').classList.remove('show');editingId=null;}

function openAdd(){document.getElementById('addName').value='';document.getElementById('addUnit').value='';document.getElementById('addIdeal').value=2;document.getElementById('addModal').classList.add('show');}
function confirmAdd(){
  var name=document.getElementById('addName').value.trim();if(!name)return;
  items.push({id:Date.now(),name:name,unit:document.getElementById('addUnit').value.trim()||'Unidad',qty:0,ideal:parseInt(document.getElementById('addIdeal').value)||2});
  closeAddModal();render();
}
function closeAddModal(){document.getElementById('addModal').classList.remove('show');}
</script></body></html>
