<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verdi — Guapito's Predictor de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#006E51;--text:#1a2e25;--gray:#6b7f78;--gray-light:#e8edeb;--radius:14px;}
body{font-family:'DM Sans',sans-serif;background:#f5f9f7;color:var(--text);min-height:100vh;}
.page{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
h1 em{font-family:'Playfair Display',serif;font-style:italic;color:var(--green);}
.subtitle{font-size:13px;color:var(--gray);margin-bottom:24px;}
.loading{text-align:center;padding:60px;color:var(--gray);font-size:15px;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:28px;}
.day-card{background:#fff;border-radius:var(--radius);padding:16px 12px;border:1.5px solid var(--gray-light);text-align:center;position:relative;overflow:hidden;transition:transform 0.15s;}
.day-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.07);}
.day-card.today{border-color:var(--green);}
.day-card.high{border-color:#f59e0b;}
.day-card.very-high{border-color:#ef4444;}
.day-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:4px;}
.day-date{font-size:13px;font-weight:600;margin-bottom:10px;}
.day-rev{font-size:22px;font-weight:900;color:var(--green);margin-bottom:4px;}
.day-rev.high{color:#f59e0b;}
.day-rev.very-high{color:#ef4444;}
.day-range{font-size:10px;color:#aaa;margin-bottom:8px;}
.day-temp{font-size:12px;margin-bottom:6px;}
.day-badges{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:8px;min-height:20px;}
.badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap;}
.badge.hot{background:#fee2e2;color:#991b1b;}
.badge.warm{background:#fef3c7;color:#92400e;}
.badge.cool{background:#dbeafe;color:#1e40af;}
.badge.rain{background:#e0e7ff;color:#3730a3;}
.badge.festivo{background:#f3e8ff;color:#6b21a8;}
.badge.pool{background:#cffafe;color:#155e75;}
.badge.weekend{background:#f0fdf4;color:#166534;}
.badge.school{background:#fef9c3;color:#713f12;}
.staffing{font-size:11px;font-weight:700;padding:4px 0;border-radius:6px;}
.staffing.s1{background:#f0fdf4;color:#166534;}
.staffing.s2{background:#fef9c3;color:#713f12;}
.staffing.s3{background:#fee2e2;color:#991b1b;}
.inv-flag{font-size:10px;color:var(--gray);margin-top:6px;}
.section-label{font-size:10px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:600;}
.confidence-bar{height:4px;background:var(--gray-light);border-radius:2px;margin-top:6px;overflow:hidden;}
.confidence-fill{height:100%;background:var(--green);border-radius:2px;}
.insights{background:#fff;border-radius:var(--radius);padding:20px;border:1.5px solid var(--gray-light);margin-bottom:20px;}
.insights h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--green);}
.insight-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.insight-row:last-child{border-bottom:none;}
.insight-icon{font-size:18px;flex-shrink:0;}
.data-note{background:#f0f7f4;border-radius:10px;padding:12px 16px;font-size:12px;color:var(--gray);margin-bottom:20px;border-left:3px solid var(--green);}
</style>
</head><body>

<script>
var db = null;
var salesHistory = [];
var weather = [];

// Hard timeout - show error if nothing loads in 8 seconds
window.addEventListener('load', function() {
  // Check every second, show error after 10s
  var checks = 0;
  var checker = setInterval(function() {
    checks++;
    var app = document.getElementById('app');
    if (!app) return;
    var stillLoading = app.innerHTML.indexOf('Loading') !== -1 || app.innerHTML.indexOf('meteorol') !== -1;
    if (!stillLoading) { clearInterval(checker); return; }
    if (checks >= 10) {
      clearInterval(checker);
      showLoadError('connection');
    }
  }, 1000);
});

function showLoadError(reason) {
  var html = '';
  if (reason === 'connection') {
    html = '<div style="text-align:center;padding:60px 20px;">'+
      '<div style="font-size:48px;margin-bottom:16px;">📡</div>'+
      '<h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">No se puede conectar</h2>'+
      '<p style="font-size:14px;color:#6b7f78;margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto;">'+
      'No se pudo conectar con Firebase o el servicio meteorológico.<br>Comprueba tu conexión a internet e inténtalo de nuevo.</p>'+
      '<button onclick="location.reload()" style="padding:12px 28px;background:#006E51;color:#fff;border:none;border-radius:20px;font-family:DM Sans,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>'+
    '</div>';
  } else if (reason === 'nodata') {
    var daysNeeded = 5 - salesHistory.length;
    var confidence = Math.min(95, 40 + salesHistory.length * 4);
    html = '<div style="text-align:center;padding:60px 20px;">'+
      '<div style="font-size:48px;margin-bottom:16px;">📊</div>'+
      '<h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">Predictor en entrenamiento</h2>'+
      '<p style="font-size:14px;color:#6b7f78;margin-bottom:20px;max-width:440px;margin-left:auto;margin-right:auto;">'+
      'El predictor necesita al menos <strong>5 días</strong> de datos de ventas reales para hacer predicciones fiables.<br><br>'+
      'Actualmente tienes <strong>'+salesHistory.length+' día(s)</strong> de datos. '+
      'Faltan <strong>'+daysNeeded+' día(s)</strong> más.</p>'+
      '<div style="max-width:320px;margin:0 auto 20px;">'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7f78;margin-bottom:6px;">'+
          '<span>Precisión actual</span><span>'+confidence+'%</span>'+
        '</div>'+
        '<div style="height:8px;background:#e8edeb;border-radius:4px;overflow:hidden;">'+
          '<div style="height:8px;background:'+(confidence>=60?'#006E51':'#f59e0b')+';border-radius:4px;width:'+confidence+'%;transition:width 0.5s;"></div>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-top:4px;">'+
          '<span>0%</span><span>Mínimo 60%</span><span>95%</span>'+
        '</div>'+
      '</div>'+

    '</div>';
  }

}

// ── Spanish public holidays (national + Madrid) ──────────────────────
var FESTIVOS_2026 = [
  '2026-01-01','2026-01-06','2026-04-02','2026-04-03',
  '2026-05-01','2026-05-02','2026-05-15','2026-08-15',
  '2026-10-12','2026-11-01','2026-11-09','2026-12-06',
  '2026-12-08','2026-12-25'
];
var FESTIVOS_2025 = [
  '2025-01-01','2025-01-06','2025-04-17','2025-04-18',
  '2025-05-01','2025-05-02','2025-05-15','2025-08-15',
  '2025-10-12','2025-11-01','2025-11-10','2025-12-06',
  '2025-12-08','2025-12-25'
];
var ALL_FESTIVOS = FESTIVOS_2025.concat(FESTIVOS_2026);

// ── Boadilla pool season: roughly June 15 – Sep 15 ──────────────────
function isPoolSeason(d) {
  var m=d.getMonth()+1, day=d.getDate();
  return (m===6&&day>=15)||(m===7)||(m===8)||(m===9&&day<=15);
}

// ── School holidays (Madrid) ─────────────────────────────────────────
function isSchoolHoliday(d) {
  var m=d.getMonth()+1, day=d.getDate();
  var dateStr = d.toISOString().slice(0,10);
  if(ALL_FESTIVOS.includes(dateStr)) return true;
  // Summer
  if(m>=6&&m<=8) return true;
  // Christmas ~Dec 23 - Jan 7
  if((m===12&&day>=23)||(m===1&&day<=7)) return true;
  // Easter ~1 week
  if(m===4&&day>=2&&day<=10) return true;
  return false;
}

function isFestivo(d) {
  return ALL_FESTIVOS.includes(d.toISOString().slice(0,10));
}

// ── Day of week baseline multipliers ────────────────────────────────
var DOW_BASE = [0.55, 0.50, 0.55, 0.60, 0.80, 1.0, 0.95]; // Sun-Sat

// ── Weather multiplier ───────────────────────────────────────────────
function weatherMultiplier(tempMax, precip) {
  var m = 1.0;
  if(tempMax >= 35) m *= 1.45;
  else if(tempMax >= 30) m *= 1.30;
  else if(tempMax >= 25) m *= 1.15;
  else if(tempMax >= 20) m *= 1.0;
  else if(tempMax >= 15) m *= 0.75;
  else m *= 0.50;
  if(precip > 5) m *= 0.40;
  else if(precip > 1) m *= 0.70;
  return m;
}

  s.src=url;

  s.onload=function(){cb(null);};
  document.head.appendChild(s);
}

// ── Fetch 7-day forecast from Open-Meteo (free, no key) ─────────────
function fetchWeather() {
  document.getElementById('app').innerHTML='<div class="loading">☀️ Obteniendo previsión meteorológica...</div>';
  // Use AbortController for timeout
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var weatherTimer = setTimeout(function(){
    if(controller) controller.abort();
    runWithoutWeather();
  }, 6000);

  function runWithoutWeather() {
    clearTimeout(weatherTimer);
    weather=[];
    var today=new Date();
    for(var i=0;i<7;i++){
      var d=new Date(today);d.setDate(today.getDate()+i);
      weather.push({date:d.toISOString().slice(0,10),tempMax:null,tempMin:null,precip:0,code:0});
    }
    runPredictor();
  }

  fetch('https://api.open-meteo.com/v1/forecast?latitude=40.4067&longitude=-3.8758&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Europe%2FMadrid&forecast_days=7',
    controller ? {signal: controller.signal} : {}
  ).then(function(r){return r.json();})
  .then(function(data){
    clearTimeout(weatherTimer);
    weather=[];
    for(var i=0;i<7;i++){
      weather.push({
        date: data.daily.time[i],
        tempMax: data.daily.temperature_2m_max[i],
        tempMin: data.daily.temperature_2m_min[i],
        precip: data.daily.precipitation_sum[i],
        code: data.daily.weathercode[i]
      });
    }
    runPredictor();
  }).catch(function(){
    runWithoutWeather();
  });
}

// ── Build historical average by day of week ──────────────────────────
function buildDowAverages() {
  var buckets=Array(7).fill(null).map(function(){return [];});
  salesHistory.forEach(function(d){
    var dow=new Date(d.date+'T12:00:00').getDay();
    buckets[dow].push(d.totalRev);
  });
  return buckets.map(function(b){
    if(b.length===0) return null;
    return b.reduce(function(s,v){return s+v;},0)/b.length;
  });
}

// ── Build recent trend multiplier (last 2 weeks vs overall avg) ──────
function buildTrendMultiplier() {
  if(salesHistory.length<4) return 1.0;
  var all=salesHistory.map(function(d){return d.totalRev;});
  var recent=salesHistory.slice(-10).map(function(d){return d.totalRev;});
  var allAvg=all.reduce(function(s,v){return s+v;},0)/all.length;
  var recAvg=recent.reduce(function(s,v){return s+v;},0)/recent.length;
  var trend=allAvg>0?recAvg/allAvg:1.0;
  return Math.max(0.7,Math.min(1.5,trend));
}

// ── Global baseline (overall daily average) ──────────────────────────
function globalAvg() {
  if(salesHistory.length===0) return 600;
  return salesHistory.reduce(function(s,d){return s+d.totalRev;},0)/salesHistory.length;
}

function weatherIcon(code,temp) {
  if(code>=95) return '⛈️';
  if(code>=80) return '🌧️';
  if(code>=60) return '🌦️';
  if(code>=45) return '🌫️';
  if(code>=2) return '⛅';
  if(temp>=30) return '☀️🔥';
  return '☀️';
}

// ── Main predictor ───────────────────────────────────────────────────
function runPredictor() {
  // Gate: need at least 5 days of real data for meaningful predictions
  var confidence = Math.min(95, 40 + salesHistory.length * 4);
  if (salesHistory.length < 5) {
    showLoadError('nodata');
    return;
  }
  var dow=buildDowAverages();
  var trend=buildTrendMultiplier();
  var gAvg=globalAvg();
  var today=new Date();today.setHours(0,0,0,0);
  var confidence=Math.min(95,40+salesHistory.length*4);
  var dataNote=salesHistory.length<7?
    '⚠️ Solo '+salesHistory.length+' día(s) de datos reales. Las predicciones mejorarán cada semana que uses el sistema. Con 4 semanas de datos, la precisión será del ~80%.':
    '✅ '+salesHistory.length+' días de datos históricos · Confianza: '+confidence+'%';

  var days=weather.map(function(w,i){
    var d=new Date(w.date+'T12:00:00');
    var dayDow=d.getDay();
    var isTdy=d.toDateString()===today.toDateString();
    var festivo=isFestivo(d);
    var pool=isPoolSeason(d);
    var schoolHol=isSchoolHoliday(d);
    var weekend=dayDow===0||dayDow===6;
    var isWeekend=weekend;

    // Base: use dow average if available, else global avg × dow multiplier
    var base=dow[dayDow]!==null ? dow[dayDow] : gAvg*DOW_BASE[dayDow]/DOW_BASE[5];

    // Apply multipliers
    var mult=1.0;
    if(w.tempMax!==null) mult*=weatherMultiplier(w.tempMax,w.precip);
    if(festivo) mult*=1.25;
    if(pool&&!festivo) mult*=1.20;
    if(schoolHol&&!festivo&&!pool) mult*=1.10;
    mult*=trend;

    var predicted=Math.round(base*mult/5)*5;
    var low=Math.round(predicted*0.80/5)*5;
    var high=Math.round(predicted*1.20/5)*5;

    // Staffing
    var staff, staffClass;
    if(predicted<400){staff='1 persona';staffClass='s1';}
    else if(predicted<800){staff='2 personas';staffClass='s2';}
    else{staff='3+ personas';staffClass='s3';}

    // Revenue tier
    var tier='normal',revClass='';
    if(predicted>=1000){tier='very-high';revClass='very-high';}
    else if(predicted>=700){tier='high';revClass='high';}

    // Inventory flag
    var invFlag='';
    if(predicted>=900){invFlag='📦 Revisar stock completo';}
    else if(predicted>=600){invFlag='📦 Verificar vitrina';}

    // Badges
    var badges=[];
    if(w.tempMax!==null){
      if(w.tempMax>=35) badges.push({t:'🔥 '+Math.round(w.tempMax)+'°',c:'hot'});
      else if(w.tempMax>=28) badges.push({t:'☀️ '+Math.round(w.tempMax)+'°',c:'warm'});
      else if(w.tempMax<18) badges.push({t:'🥶 '+Math.round(w.tempMax)+'°',c:'cool'});
      else badges.push({t:Math.round(w.tempMax)+'°',c:'warm'});
      if(w.precip>1) badges.push({t:'🌧️ '+w.precip.toFixed(1)+'mm',c:'rain'});
    }
    if(festivo) badges.push({t:'🎉 Festivo',c:'festivo'});
    if(pool) badges.push({t:'🏊 Piscinas',c:'pool'});
    if(schoolHol&&!festivo) badges.push({t:'🎓 Vacaciones',c:'school'});
    if(isWeekend&&!festivo) badges.push({t:'Weekend',c:'weekend'});

    return {d,isTdy,festivo,pool,schoolHol,weekend:isWeekend,
            predicted,low,high,staff,staffClass,revClass,tier,
            invFlag,badges,confidence,w,dayDow};
  });

  renderPredictor(days,dataNote,trend,gAvg);
}

function renderPredictor(days,dataNote,trend,gAvg) {
  var DOW_NAMES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  var totalWeek=days.reduce(function(s,d){return s+d.predicted;},0);
  var bestDay=days.reduce(function(a,b){return a.predicted>b.predicted?a:b;});
  var worstDay=days.reduce(function(a,b){return a.predicted<b.predicted?a:b;});
  var staffHeavy=days.filter(function(d){return d.staffClass==='s3';}).length;

  // Key insights
  var insights=[];
  if(trend>1.1) insights.push({icon:'📈',text:'Tendencia al alza — últimas semanas un '+Math.round((trend-1)*100)+'% por encima de la media histórica.'});
  if(trend<0.9) insights.push({icon:'📉',text:'Tendencia a la baja — recientes ventas un '+Math.round((1-trend)*100)+'% por debajo. Revisar stock para evitar desperdicio.'});
  var hotDays=days.filter(function(d){return d.w.tempMax>=30;});
  if(hotDays.length>0) insights.push({icon:'🔥',text:hotDays.length+' día(s) con más de 30° esta semana — espera picos de demanda, ten vitrina llena.'});
  var rainDays=days.filter(function(d){return d.w.precip>2;});
  if(rainDays.length>0) insights.push({icon:'🌧️',text:rainDays.length+' día(s) de lluvia previstos — considera reducir personal esos días.'});
  var festivoDays=days.filter(function(d){return d.festivo;});
  if(festivoDays.length>0) insights.push({icon:'🎉',text:'Hay '+festivoDays.length+' festivo(s) esta semana — tradicionalmente +25% en ventas. Asegura stock extra.'});
  if(bestDay) insights.push({icon:'🏆',text:'Mejor día previsto: '+DOW_NAMES[bestDay.dayDow]+' con €'+bestDay.predicted+' de media. Máxima plantilla recomendada.'});
  if(staffHeavy>0) insights.push({icon:'👥',text:staffHeavy+' día(s) necesitan 3+ personas. Confirma disponibilidad de plantilla.'});
  insights.push({icon:'📦',text:'Stock recomendado para la semana: provisión para €'+Math.round(totalWeek*1.1/5)*5+' de ventas (10% buffer).'});

  var html='';

  html+='<div class="data-note">'+dataNote+'</div>';

  // Weekly summary bar
  html+='<div style="background:#fff;border-radius:var(--radius);padding:16px 20px;border:1.5px solid var(--gray-light);margin-bottom:20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;">'+
    '<div><div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Previsión Semana</div><div style="font-size:28px;font-weight:900;color:var(--green);">€'+totalWeek.toLocaleString()+'</div></div>'+
    '<div style="width:1px;background:var(--gray-light);height:40px;"></div>'+
    '<div><div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Mejor Día</div><div style="font-size:16px;font-weight:700;">'+DOW_NAMES[bestDay.dayDow]+' €'+bestDay.predicted+'</div></div>'+
    '<div style="width:1px;background:var(--gray-light);height:40px;"></div>'+
    '<div><div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Día Más Flojo</div><div style="font-size:16px;font-weight:700;">'+DOW_NAMES[worstDay.dayDow]+' €'+worstDay.predicted+'</div></div>'+
    '<div style="width:1px;background:var(--gray-light);height:40px;"></div>'+
    '<div><div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Días 3+ Personal</div><div style="font-size:16px;font-weight:700;">'+staffHeavy+' día(s)</div></div>'+
  '</div>';

  // Insights
  html+='<div class="insights"><h3>💡 Insights de la Semana</h3>'+
    insights.map(function(ins){
      return '<div class="insight-row"><span class="insight-icon">'+ins.icon+'</span><span>'+ins.text+'</span></div>';
    }).join('')+'</div>';

  // Day cards
  html+='<div class="section-label">Previsión Día a Día</div>';
  html+='<div class="day-grid">';
  days.forEach(function(day){
    var d=day.d;
    var dateLabel=d.getDate()+' '+MONTHS[d.getMonth()];
    html+='<div class="day-card'+(day.isTdy?' today':'')+(day.tier===' very-high'?' very-high':day.tier==='high'?' high':'')+'">'+
      (day.isTdy?'<div style="position:absolute;top:0;left:0;right:0;background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:2px;text-align:center;letter-spacing:1px;">HOY</div><div style="margin-top:12px;"></div>':'<div style="height:4px;"></div>')+
      '<div class="day-name">'+DOW_NAMES[day.dayDow]+'</div>'+
      '<div class="day-date">'+dateLabel+'</div>'+
      '<div class="day-rev '+day.revClass+'">€'+day.predicted+'</div>'+
      '<div class="day-range">€'+day.low+' – €'+day.high+'</div>'+
      '<div class="day-temp">'+(day.w.tempMax!==null?weatherIcon(day.w.code,day.w.tempMax)+' '+Math.round(day.w.tempMax)+'° / '+Math.round(day.w.tempMin)+'°':'Sin datos clima')+'</div>'+
      '<div class="day-badges">'+
        day.badges.map(function(b){return '<span class="badge '+b.c+'">'+b.t+'</span>';}).join('')+
      '</div>'+
      '<div class="staffing '+day.staffClass+'">👥 '+day.staff+'</div>'+
      (day.invFlag?'<div class="inv-flag">'+day.invFlag+'</div>':'')+
      '<div class="confidence-bar"><div class="confidence-fill" style="width:'+day.confidence+'%;"></div></div>'+
      '<div style="font-size:9px;color:#ccc;margin-top:2px;">Confianza '+day.confidence+'%</div>'+
    '</div>';
  });
  html+='</div>';

  html+='<div style="font-size:11px;color:#aaa;text-align:center;margin-top:8px;">Meteorología: Open-Meteo · Festivos: Comunidad de Madrid · Actualizado: '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})+' · El predictor mejora cada semana con más datos.</div>';

  document.getElementById('app').innerHTML=html;
  document.getElementById('subtitle').textContent='Previsión 7 días · Boadilla del Monte · '+new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}
