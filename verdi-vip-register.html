<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a1a1a">
<title>Verdi VIP — Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#111;color:#fff;font-family:"DM Sans",sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}

.silver{background:linear-gradient(135deg,#888 0%,#fff 30%,#ccc 50%,#fff 70%,#888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.logo-img{width:280px;margin:0 auto 4px;display:block;filter:drop-shadow(0 2px 8px rgba(255,255,255,0.15));}
.helados{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#aaa;text-align:center;margin-bottom:32px;}

.card{background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,0.8);}

h2{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:#ccc;text-align:center;margin-bottom:8px;}
.sub{font-size:11px;letter-spacing:2px;color:#666;text-align:center;margin-bottom:28px;text-transform:uppercase;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#666;margin-bottom:8px;}
.field input{width:100%;background:transparent;border:none;border-bottom:1px solid #333;padding:10px 0;font-family:"DM Sans",sans-serif;font-size:16px;color:#fff;outline:none;transition:border-color 0.2s;}
.field input::placeholder{color:#444;}
.field input:focus{border-bottom-color:#888;}

.btn{width:100%;padding:16px;background:transparent;border:1px solid #555;color:#aaa;font-family:"DM Sans",sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.btn:hover{border-color:#aaa;color:#fff;}
.btn:active{background:#222;}

.divider{width:60px;height:1px;background:linear-gradient(to right,transparent,#444,transparent);margin:24px auto;}

.tagline{font-size:10px;letter-spacing:2px;color:#555;text-align:center;text-transform:uppercase;margin-top:20px;}

.status{text-align:center;font-size:13px;color:#888;margin-top:16px;min-height:20px;}
.status.error{color:#c0392b;}
</style>
</head>

<div style="font-family:\'Cormorant Garamond\',serif;font-size:11px;font-weight:300;letter-spacing:7px;text-transform:uppercase;color:#666;text-align:center;margin-top:8px;margin-bottom:24px;">Helado Artesano</div>


<div class="card">
  <h2>Programa VIP</h2>
  <div class="sub">Boadilla del Monte · Madrid</div>

  <div class="field">
    <label>Nombre completo</label>
    <input type="text" id="name" placeholder="Tu nombre" autocomplete="name">
  </div>
  <div class="field">
    <label>Teléfono</label>
    <input type="tel" id="phone" placeholder="612 345 678" autocomplete="tel">
  </div>

  <button class="btn" onclick="register()">Unirse al Club · Verdi</button>
  <div class="status" id="status"></div>
</div>

<div class="divider"></div>
<div class="tagline">Es más que helado, es Verdi.</div>

<script>
var DB = "https://verdi-boadilla---pos-default-rtdb.europe-west1.firebasedatabase.app";

function cleanPhone(p) {
  return p.replace(/[^0-9]/g,"");
}

async function getNextVipNumber() {
  var res = await fetch(DB + "/pos/vip_counter.json");
  var val = await res.json();
  var next = (val || 9) + 1;
  return next;
}

async function register() {
  var name = document.getElementById("name").value.trim();
  var phone = cleanPhone(document.getElementById("phone").value);
  var status = document.getElementById("status");

  if (!name) { status.className="status error"; status.textContent="Por favor introduce tu nombre."; return; }
  if (phone.length < 9) { status.className="status error"; status.textContent="Teléfono no válido."; return; }

  status.className="status"; status.textContent="Un momento...";

  try {
    // Check if already registered
    var checkRes = await fetch(DB + "/pos/vip/" + phone + ".json");
    var existing = await checkRes.json();
    if (existing) {
      // Already exists — redirect to their card
      window.location.href = "verdi-vip-card.html?id=" + phone;
      return;
    }

    // Get next VIP number
    var vipNum = await getNextVipNumber();

    // Save to Firebase
    var entry = {
      name: name,
      phone: phone,
      vipNumber: vipNum,
      totalSpent: 0,
      visits: 0,
      rewardsClaimed: 0,
      notes: "",
      joinedAt: new Date().toISOString()
    };

    // Write customer
    await fetch(DB + "/pos/vip/" + phone + ".json", {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(entry)
    });

    // Update counter
    await fetch(DB + "/pos/vip_counter.json", {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(vipNum)
    });

    // Go to their card
    window.location.href = "verdi-vip-card.html?id=" + phone;

  } catch(e) {
    status.className="status error";
    status.textContent="Error de conexión. Inténtalo de nuevo.";
  }
}

document.querySelectorAll("input").forEach(function(inp){
  inp.addEventListener("keydown", function(e){ if(e.key==="Enter") register(); });
});
</script>
