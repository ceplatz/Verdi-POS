<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verdi — Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#006E51;--green-light:#e0f2ed;--text:#1a2e25;--gray:#6b7f78;--gray-light:#e8edeb;--red:#ef4444;--amber:#f59e0b;--radius:14px;}
body{font-family:'DM Sans',sans-serif;background:#f5f9f7;color:var(--text);min-height:100vh;}
.page{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
h1 em{font-family:'Playfair Display',serif;font-style:italic;color:var(--green);}
.subtitle{font-size:13px;color:var(--gray);margin-bottom:24px;}

/* Search + filters */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--gray-light);border-radius:24px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;outline:none;}
.search-box:focus{border-color:var(--green);}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;}
.cat-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:#fff;color:var(--gray);transition:all 0.15s;}
.cat-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.kb-card{background:#fff;border:1.5px solid var(--gray-light);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;}
.kb-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);}
.kb-card-icon{font-size:40px;text-align:center;margin-bottom:10px;}
.kb-card-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.kb-card-cat{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--green-light);color:var(--green);font-weight:600;display:inline-block;margin-bottom:8px;}
.kb-card-desc{font-size:13px;color:var(--gray);line-height:1.5;}
.kb-card-edit{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center;}
.kb-card:hover .kb-card-edit{display:flex;}
.kb-card-edit:hover{border-color:var(--green);color:var(--green);}

/* Add button */
.btn-add{background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-add:hover{background:#005a42;}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:20px;width:640px;max-width:100%;box-shadow:0 24px 80px rgba(0,0,0,0.2);}
.modal-header{padding:24px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-icon{font-size:52px;line-height:1;}
.modal-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.modal-cat{font-size:12px;padding:3px 10px;border-radius:10px;background:var(--green-light);color:var(--green);font-weight:600;display:inline-block;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-body{padding:20px 24px 24px;}
.modal-section{margin-bottom:16px;}
.modal-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);margin-bottom:8px;}
.step-list{list-style:none;counter-reset:steps;}
.step-list li{counter-increment:steps;display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px;line-height:1.5;}
.step-list li:last-child{border-bottom:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ingredient-list{display:flex;flex-wrap:wrap;gap:6px;}
.ingredient-tag{background:#f5f9f7;border:1px solid var(--gray-light);border-radius:8px;padding:4px 10px;font-size:13px;}
.notes-box{background:#fef9c3;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.6;color:#713f12;}
.modal-footer{border-top:1px solid var(--gray-light);padding:14px 24px;display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:9px 18px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:#fff;color:var(--text);}
.btn.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn.red{background:var(--red);color:#fff;border-color:var(--red);}

/* Edit form */
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-field label{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.form-field input,.form-field select,.form-field textarea{padding:9px 12px;border:1.5px solid var(--gray-light);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:var(--text);resize:vertical;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--green);}
.steps-editor{display:flex;flex-direction:column;gap:6px;}
.step-row{display:flex;gap:6px;align-items:flex-start;}
.step-row input{flex:1;padding:8px 10px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;}
.step-row input:focus{outline:none;border-color:var(--green);}
.del-step{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;color:var(--gray);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.del-step:hover{border-color:var(--red);color:var(--red);}
.add-step{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;padding:4px 0;font-weight:600;}

/* PIN overlay */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;align-items:center;justify-content:center;}
.pin-overlay.show{display:flex;}
.pin-box{background:#fff;border-radius:20px;padding:28px;width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.pin-box h3{font-size:18px;font-weight:700;margin-bottom:6px;}
.pin-box p{font-size:13px;color:var(--gray);margin-bottom:16px;}
.pin-input{width:100%;padding:12px;border:1.5px solid var(--gray-light);border-radius:10px;font-size:22px;text-align:center;font-family:'DM Sans',sans-serif;letter-spacing:6px;margin-bottom:10px;}
.pin-error{color:var(--red);font-size:12px;margin-bottom:10px;min-height:18px;}
.pin-btns{display:flex;gap:10px;}
.pin-btns button{flex:1;padding:10px;border-radius:10px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
</style>
</head><body>

    <button onclick="window.location.href='index.html'" style="padding:8px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:2px solid rgba(255,255,255,0.4);background:transparent;color:#fff;cursor:pointer;">← POS</button>
    <button onclick="openPin()" id="editBtn" style="padding:8px 18px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;background:#fff;color:#006E51;border:none;cursor:pointer;">✏️ Editar</button>
  </div>
</header>

<div class="page">
  <h1>📚 <em>Knowledge Base</em></h1>
  <div class="subtitle">Guías de producto · Recetas · Procedimientos</div>

  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="🔍 Buscar producto..." oninput="renderCards()">
    <div class="cat-filter" id="catFilter"></div>
    <button class="btn-add" id="addBtn" style="display:none;" onclick="openAddCard()">+ Nueva tarjeta</button>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>
  </div>
</div>

<!-- Detail / View Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-icon" id="vIcon"></div>
        <div class="modal-title" id="vName"></div>
        <div class="modal-cat" id="vCat"></div>
      </div>
      <button class="modal-close" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body" id="vBody"></div>
    <div class="modal-footer">
      <button class="btn red" id="vDelBtn" style="display:none;" onclick="deleteCard()">Eliminar</button>
      <button class="btn" id="vEditBtn" style="display:none;" onclick="switchToEdit()">✏️ Editar</button>
      <button class="btn" onclick="closeViewModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- Edit / Add Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <div style="flex:1;">
        <h3 id="editModalTitle" style="font-size:18px;font-weight:700;">Nueva Tarjeta</h3>
      </div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:80px 1fr;gap:12px;margin-bottom:12px;">
        <div class="form-field"><label>Emoji</label><input type="text" id="eIcon" placeholder="☕" maxlength="4" style="font-size:28px;text-align:center;"></div>
        <div class="form-field"><label>Nombre</label><input type="text" id="eName" placeholder="Affogato"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="form-field"><label>Categoría</label>
          <select id="eCat">
            <option>Helado</option><option>Café</option><option>Batidos</option><option>Takis</option><option>Procedimiento</option><option>Otro</option>
          </select>
        </div>
        <div class="form-field"><label>Descripción corta</label><input type="text" id="eDesc" placeholder="Breve descripción..."></div>
      </div>
      <div class="form-field" style="margin-bottom:12px;">
        <label>Ingredientes (separados por coma)</label>
        <input type="text" id="eIngredients" placeholder="2 bolas helado, 1 shot espresso, ...">
      </div>
      <div class="form-field" style="margin-bottom:8px;"><label>Pasos</label></div>
      <div class="steps-editor" id="stepsEditor"></div>
      <button class="add-step" onclick="addStep()">+ Añadir paso</button>
      <div class="form-field" style="margin-top:12px;">
        <label>Notas / Alérgenos / Precio</label>
        <textarea id="eNotes" rows="3" placeholder="Alérgenos: leche, huevo. Precio: €4.90..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()">Cancelar</button>
      <button class="btn green" onclick="saveCard()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- PIN overlay -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div style="font-size:32px;margin-bottom:8px;">🔐</div>
    <h3>Acceso Editor</h3>
    <p>Introduce el PIN para editar</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()">
    <div class="pin-error" id="pinError"></div>
    <div class="pin-btns">
      <button style="border:1.5px solid #e8edeb;background:#fff;color:#6b7f78;border-radius:10px;" onclick="closePinOverlay()">Cancelar</button>
      <button style="background:#006E51;color:#fff;border:none;border-radius:10px;" onclick="checkPin()">Entrar</button>
    </div>
  </div>
</div>

<script>
var db = null;
var isEditor = false;
var cards = [];
var editingId = null;
var activeCategory = 'Todos';
var OWNER_PIN = '2611';

// ── Firebase ──────────────────────────────────────────────────────────
function loadScript(url,cb){var s=document.createElement('script');s.src=url;s.onload=cb;s.onerror=cb;document.head.appendChild(s);}
loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',function(){
  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js',function(){
    try{
      firebase.initializeApp({
        apiKey:'AIzaSyD1eZY0iSRR9FMLR6VidYe4TvJV7kRMswA',
        databaseURL:'https://verdi-boadilla---pos-default-rtdb.europe-west1.firebasedatabase.app',
        projectId:'verdi-boadilla---pos',
        appId:'1:421348834098:web:74b5b979b36ac8cadb752b'
      });
      db = firebase.database();
    }catch(e){}
    loadCards();
  });
});

function loadCards() {
  if(!db){ renderCards(); return; }
  db.ref('pos/kb').on('value', function(snap){
    var d = snap.val() || {};
    cards = Object.values(d).sort(function(a,b){return a.name.localeCompare(b.name);});
    buildCatFilter();
    renderCards();
  });
}

function buildCatFilter() {
  var cats = ['Todos'];
  cards.forEach(function(c){ if(!cats.includes(c.cat)) cats.push(c.cat); });
  var f = document.getElementById('catFilter');
  f.innerHTML = cats.map(function(c){
    return '<button class="cat-btn'+(c===activeCategory?' active':'')+'" onclick="selectCat(\''+c+'\')" >'+c+'</button>';
  }).join('');
}

function selectCat(cat) {
  activeCategory = cat;
  buildCatFilter();
  renderCards();
}

function renderCards() {
  var q = document.getElementById('searchBox').value.toLowerCase();
  var filtered = cards.filter(function(c){
    var matchCat = activeCategory==='Todos' || c.cat===activeCategory;
    var matchQ   = !q || c.name.toLowerCase().includes(q) || (c.desc||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  var grid = document.getElementById('cardsGrid');
  if(filtered.length===0){
    grid.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>No se encontraron tarjetas.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(c){
    return '<div class="kb-card" onclick="openCard(\''+c.id+'\')">'  +
      (isEditor?'<button class="kb-card-edit" onclick="event.stopPropagation();editCard(\''+c.id+'\')">✏️</button>':'')+
      '<div class="kb-card-icon">'+(c.icon||'📋')+'</div>'+
      '<div class="kb-card-name">'+c.name+'</div>'+
      '<div class="kb-card-cat">'+c.cat+'</div>'+
      '<div class="kb-card-desc">'+(c.desc||'')+'</div>'+
    '</div>';
  }).join('');
}

function openCard(id) {
  var c = cards.find(function(x){return x.id===id;});
  if(!c) return;
  editingId = id;
  document.getElementById('vIcon').textContent = c.icon||'📋';
  document.getElementById('vName').textContent = c.name;
  document.getElementById('vCat').textContent  = c.cat;

  var body = '';
  if(c.ingredients&&c.ingredients.length){
    body += '<div class="modal-section"><div class="modal-section-title">Ingredientes</div><div class="ingredient-list">'+
      c.ingredients.map(function(i){return '<span class="ingredient-tag">'+i.trim()+'</span>';}).join('')+'</div></div>';
  }
  if(c.steps&&c.steps.length){
    body += '<div class="modal-section"><div class="modal-section-title">Preparación</div><ol class="step-list">'+
      c.steps.map(function(s){return '<li><span class="step-num">'+''+'</span><span>'+s+'</span></li>';}).join('')+'</ol></div>';
  }
  if(c.notes){
    body += '<div class="modal-section"><div class="modal-section-title">Notas</div><div class="notes-box">'+c.notes+'</div></div>';
  }
  document.getElementById('vBody').innerHTML = body || '<p style="color:var(--gray);font-size:14px;">Sin contenido adicional.</p>';
  document.getElementById('vDelBtn').style.display  = isEditor?'block':'none';
  document.getElementById('vEditBtn').style.display = isEditor?'block':'none';
  document.getElementById('viewModal').classList.add('show');
}

function closeViewModal(){ document.getElementById('viewModal').classList.remove('show'); }

function switchToEdit() { closeViewModal(); editCard(editingId); }

function openAddCard() {
  editingId = null;
  document.getElementById('editModalTitle').textContent = 'Nueva Tarjeta';
  document.getElementById('eIcon').value = '';
  document.getElementById('eName').value = '';
  document.getElementById('eDesc').value = '';
  document.getElementById('eIngredients').value = '';
  document.getElementById('eNotes').value = '';
  document.getElementById('stepsEditor').innerHTML = '';
  addStep(); addStep();
  document.getElementById('editModal').classList.add('show');
}

function editCard(id) {
  var c = cards.find(function(x){return x.id===id;});
  if(!c) return;
  editingId = id;
  document.getElementById('editModalTitle').textContent = 'Editar: '+c.name;
  document.getElementById('eIcon').value = c.icon||'';
  document.getElementById('eName').value = c.name||'';
  document.getElementById('eCat').value  = c.cat||'Helado';
  document.getElementById('eDesc').value = c.desc||'';
  document.getElementById('eIngredients').value = (c.ingredients||[]).join(', ');
  document.getElementById('eNotes').value = c.notes||'';
  var se = document.getElementById('stepsEditor');
  se.innerHTML = '';
  (c.steps||['']).forEach(function(s){ addStep(s); });
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal(){ document.getElementById('editModal').classList.remove('show'); }

function addStep(val) {
  var se = document.getElementById('stepsEditor');
  var row = document.createElement('div');
  row.className = 'step-row';
  var num = se.children.length+1;
  row.innerHTML = '<span style="width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:6px;">'+num+'</span>'+
    '<input type="text" placeholder="Paso '+num+'..." value="'+(val||'')+'">' +
    '<button class="del-step" onclick="removeStep(this)">✕</button>';
  se.appendChild(row);
}

function removeStep(btn) {
  btn.closest('.step-row').remove();
  document.querySelectorAll('.step-row').forEach(function(row,i){
    row.querySelector('span').textContent = i+1;
    row.querySelector('input').placeholder = 'Paso '+(i+1)+'...';
  });
}

function saveCard() {
  var icon = document.getElementById('eIcon').value.trim();
  var name = document.getElementById('eName').value.trim();
  var cat  = document.getElementById('eCat').value;
  var desc = document.getElementById('eDesc').value.trim();
  var ingRaw = document.getElementById('eIngredients').value;
  var ingredients = ingRaw.split(',').map(function(s){return s.trim();}).filter(Boolean);
  var steps = Array.from(document.querySelectorAll('#stepsEditor input')).map(function(i){return i.value.trim();}).filter(Boolean);
  var notes = document.getElementById('eNotes').value.trim();
  if(!name){ alert('Nombre requerido.'); return; }
  var entry = {id: editingId||('kb_'+Date.now()), icon, name, cat, desc, ingredients, steps, notes, updatedAt: new Date().toISOString()};
  if(db){
    db.ref('pos/kb/'+entry.id).set(entry).then(function(){
      closeEditModal();
    });
  }
}

function deleteCard() {
  if(!confirm('¿Eliminar esta tarjeta?')) return;
  if(db) db.ref('pos/kb/'+editingId).remove();
  closeViewModal();
}

// ── PIN ───────────────────────────────────────────────────────────────
function openPin(){ document.getElementById('pinInput').value=''; document.getElementById('pinError').textContent=''; document.getElementById('pinOverlay').classList.add('show'); setTimeout(function(){document.getElementById('pinInput').focus();},100); }
function closePinOverlay(){ document.getElementById('pinOverlay').classList.remove('show'); }
function checkPin(){
  if(document.getElementById('pinInput').value===OWNER_PIN){
    closePinOverlay();
    isEditor=true;
    document.getElementById('addBtn').style.display='flex';
    document.getElementById('editBtn').textContent='✅ Editor';
    renderCards();
  } else {
    document.getElementById('pinError').textContent='PIN incorrecto';
    document.getElementById('pinInput').value='';
  }
}
document.getElementById('pinInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkPin();});
</script>
</body></html>
